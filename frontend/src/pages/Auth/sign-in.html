<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartWorkshop - Sign in</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card">
        <h1>Sign in</h1>
        <form class="auth-form" id="signInForm">
          <label>
            Email address
            <input id="signInEmail" type="email" placeholder="name@example.com" autocomplete="email" />
          </label>
          <label>
            Password
            <input id="signInPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <a class="auth-link" href="/pages/Auth/forgot-password.html">Forgot your password</a>
          <p class="form-error" id="signInError" role="alert" aria-live="polite"></p>
          <button type="submit" class="primary auth-submit">Sign in</button>
          <label class="auth-remember">
            <input type="checkbox" /> Remember me
          </label>
        </form>
        <div class="auth-divider">
          <span>or</span>
        </div>
        <button class="auth-social facebook">Sign in with Facebook</button>
        <button class="auth-social passkey">Sign in with Passkey</button>
        <p class="auth-footnote">No account? <a href="#">Click here to get my instant price.</a></p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
