<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartWorkshop - Set New Password</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card" id="resetPasswordPage">
        <h1>Set a new password</h1>
        <p class="muted">Minimum 10 chars, 1 uppercase, 1 number, 1 symbol.</p>
        <form class="auth-form" id="resetPasswordForm">
          <label>
            New password
            <input id="resetPasswordValue" type="password" placeholder="••••••••" autocomplete="new-password" />
          </label>
          <label>
            Confirm password
            <input id="resetPasswordConfirm" type="password" placeholder="••••••••" autocomplete="new-password" />
          </label>
          <p class="form-error" id="resetPasswordError" role="alert" aria-live="polite"></p>
          <button type="submit" class="primary auth-submit">Update password</button>
        </form>
        <p class="auth-footnote"><a href="/pages/Auth/sign-in.html">Back to sign in</a></p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
